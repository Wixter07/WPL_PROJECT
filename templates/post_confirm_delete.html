{% extends 'base.html' %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 text-center">
                <h2 class="mb-3">Delete "{{ post.title }}"?</h2>
                <p class="text-muted">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, delete</button>
                    <a href="{% url 'post_detail' post.slug %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
